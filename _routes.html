<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Growth Intel · Route comparison</title>
<!--
  LOCAL REVIEW TOOL. Not part of the site.
  Self-contained on purpose (inline CSS/JS) so it has no dependencies and can
  be deleted in one move. Do not deploy: remove _routes.html before launch.

  The chrome is neutral mid-grey rather than black or white, because a dark
  frame flatters dark routes and a white frame flatters light ones. Grey
  judges them evenly.
-->
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #6e6e6e;
    font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: #fff;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: #2b2b2b;
    border-bottom: 1px solid #000;
    padding: 10px 14px;
    display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
  }
  .title { font-weight: 700; letter-spacing: .02em; margin-right: 4px; }
  .group { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .group-label { font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: #9a9a9a; margin-right: 4px; }
  button {
    font: inherit; font-size: 12px;
    padding: 5px 9px;
    background: #3d3d3d; color: #eaeaea;
    border: 1px solid #555; border-radius: 3px; cursor: pointer;
  }
  button:hover { background: #4a4a4a; }
  button[aria-pressed="true"] { background: #c9463a; border-color: #c9463a; color: #fff; }

  .grid { display: grid; gap: 14px; padding: 14px; }
  .panel { background: #2b2b2b; border: 1px solid #1a1a1a; border-radius: 4px; overflow: hidden; }
  .panel-head {
    display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
    padding: 8px 10px; border-bottom: 1px solid #1a1a1a;
  }
  .panel-name { font-size: 13px; font-weight: 700; }
  .panel-desc { font-size: 11px; color: #a8a8a8; }
  .panel-head a { font-size: 11px; color: #e08b80; text-decoration: none; white-space: nowrap; }
  .panel-head a:hover { text-decoration: underline; }

  /* The frame renders at a real desktop width, then scales down to fit its
     column, so proportions and type sizes stay truthful. */
  .viewport { position: relative; overflow: hidden; }
  .viewport iframe {
    width: 1440px; height: 1900px; border: 0; display: block;
    transform: scale(var(--s, .35));
    transform-origin: top left;
  }
</style>
</head>
<body>

<header>
  <span class="title">Growth Intel · routes</span>

  <div class="group">
    <span class="group-label">Jump to</span>
    <span id="sections"></span>
  </div>

  <div class="group">
    <span class="group-label">Columns</span>
    <button data-cols="2">2</button>
    <button data-cols="3">3</button>
    <button data-cols="4">4</button>
  </div>

  <div class="group">
    <span class="group-label">Height</span>
    <button data-h="1200">short</button>
    <button data-h="1900">tall</button>
    <button data-h="3200">page</button>
  </div>
</header>

<div class="grid" id="grid"></div>

<script>
const ROUTES = [
  ['A', '_variants/route-a-dossier.html',      'Dossier · warm paper'],
  ['B', '_variants/route-b-boardroom.html',    'Boardroom · dark + light acts'],
  ['C', '_variants/route-c-brief.html',        'Brief · midnight navy'],
  ['D', '_variants/route-d-brief-dossier.html','Brief & Dossier · navy + paper'],
  ['E', '_variants/route-e-descent.html',      'Descent · navy travels to plum'],
  ['F', '_variants/route-f-daylight.html',     'Daylight · paper + ink bookends'],
  ['G', '_variants/route-g-duotone.html',      'Duotone · navy / forest alternating']
];

const SECTIONS = [
  ['Hero', ''], ['Trap', 'trap'], ['How', 'how-it-works'], ['Diff', 'difference'],
  ['Scope', 'scope'], ['Pricing', 'pricing'], ['Subscription', 'evolves'],
  ['Teams', 'teams'], ['About', 'about'], ['Apply', 'signup']
];

const grid = document.getElementById('grid');
let cols = 3, frameH = 1900, section = '';

// Build panels
ROUTES.forEach(([letter, file, desc]) => {
  const p = document.createElement('div');
  p.className = 'panel';
  p.innerHTML =
    '<div class="panel-head">' +
      '<span><span class="panel-name">' + letter + '</span> ' +
      '<span class="panel-desc">' + desc + '</span></span>' +
      '<a href="' + file + '" target="_blank" rel="noopener">open ↗</a>' +
    '</div>' +
    '<div class="viewport"><iframe data-file="' + file + '" src="' + file + '" loading="lazy"></iframe></div>';
  grid.appendChild(p);
});

// Two things need neutralising inside each frame, for review only:
//   1. the annotation toolbar, seven copies of which is just noise here
//   2. the scroll-reveal, which leaves everything below the frame's own fold
//      sitting at opacity 0 because IntersectionObserver never fires in here
// Same origin, so the frame document is reachable.
function prepFrame(fr) {
  try {
    const d = fr.contentDocument;
    if (!d) return;
    const s = d.createElement('style');
    s.textContent =
      '[class^="ss-"],[class*=" ss-"]{display:none !important}' +
      '.reveal{opacity:1 !important;transform:none !important;transition:none !important}';
    d.head.appendChild(s);
  } catch (e) { /* ignore */ }
}
grid.querySelectorAll('iframe').forEach(fr => fr.addEventListener('load', () => prepFrame(fr)));

function layout() {
  grid.style.gridTemplateColumns = 'repeat(' + cols + ', minmax(0, 1fr))';
  const colW = (grid.clientWidth - 28 - (cols - 1) * 14) / cols;
  const s = colW / 1440;
  grid.querySelectorAll('.viewport').forEach(v => {
    v.style.setProperty('--s', s);
    v.style.height = (frameH * s) + 'px';
    v.querySelector('iframe').style.height = frameH + 'px';
  });
}

function press(sel, match) {
  document.querySelectorAll(sel).forEach(b => b.setAttribute('aria-pressed', match(b)));
}

// Section jump: reload every frame at the same anchor so the same block is
// compared across all routes at once.
const secWrap = document.getElementById('sections');
SECTIONS.forEach(([label, id]) => {
  const b = document.createElement('button');
  b.textContent = label;
  b.onclick = () => {
    section = id;
    grid.querySelectorAll('iframe').forEach(fr => {
      fr.src = fr.dataset.file + (id ? '#' + id : '');
    });
    press('#sections button', x => x.textContent === label);
  };
  secWrap.appendChild(b);
});

document.querySelectorAll('[data-cols]').forEach(b => b.onclick = () => {
  cols = +b.dataset.cols; layout(); press('[data-cols]', x => +x.dataset.cols === cols);
});
document.querySelectorAll('[data-h]').forEach(b => b.onclick = () => {
  frameH = +b.dataset.h; layout(); press('[data-h]', x => +x.dataset.h === frameH);
});

window.addEventListener('resize', layout);
layout();
press('[data-cols]', x => +x.dataset.cols === cols);
press('[data-h]', x => +x.dataset.h === frameH);
press('#sections button', x => x.textContent === 'Hero');
</script>

</body>
</html>
